site_name: Erick Liemarga
site_url: https://jankrix.github.io/writing/
site_author: Erick Liemarga
site_description: Books from the operator's chair, not the keynote stage. Practical, not polished. Useful, not beautiful.

repo_url: https://github.com/jankrix/writing
repo_name: jankrix/writing
edit_uri: ""

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: black
      accent: black
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: white
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.expand
    - navigation.path
    - navigation.top
    - navigation.indexes
    - toc.follow
    - search.suggest
    - search.highlight
    - content.code.copy

nav:
  - Home: index.md
  - Leadership as Responsibility:
      - leadership-as-responsibility/index.md
      - Part 1 — Lead Yourself First:
          - 1. Clear Mind Before Action: leadership-as-responsibility/01-clear-mind.md
          - 2. Choose the Hard Right Over the Easy Peace: leadership-as-responsibility/02-hard-right.md
          - 3. Invite Correction Before You Demand Correction: leadership-as-responsibility/03-invite-correction.md
      - Part 2 — Decide Like an Operator:
          - 4. Decide Fast, Learn Faster: leadership-as-responsibility/04-decide-fast.md
          - 5. Find the Root, Not the Scapegoat: leadership-as-responsibility/05-find-the-root.md
          - 6. Set Direction, Not Just Motion: leadership-as-responsibility/06-set-direction.md
      - Part 3 — Build and Lead the Team:
          - 7. Build the Team for the Battle Ahead: leadership-as-responsibility/07-build-team.md
          - 8. Serve the Team, Protect the Standard: leadership-as-responsibility/08-serve-team.md
          - 9. Develop People Until They No Longer Need You: leadership-as-responsibility/09-develop-people.md
          - 10. Correct with Compassion, Reward with Fairness: leadership-as-responsibility/10-correct-reward.md
          - 11. Own the Failure, Distribute the Credit: leadership-as-responsibility/11-own-failure.md
      - Part 4 — Communicate Like a Leader:
          - 12. Communicate More When Things Are Unclear: leadership-as-responsibility/12-communicate-unclear.md
          - 13. Adapt the Frame, Never the Truth: leadership-as-responsibility/13-adapt-frame.md
      - Part 5 — Build the System:
          - 14. Build Systems, Not Heroics: leadership-as-responsibility/14-build-systems.md
          - 15. Build Legacy, Not Dependency: leadership-as-responsibility/15-build-legacy.md
  - Career Loop:
      - "Select Language": nextpath/index.md
      - "Versi Indonesia":
        - "Introduction": nextpath/id/chapter-1-introduction.md
        - Level 1 — The Explorer: nextpath/id/chapter-2-explorer.md
        - Level 2 — The Builder: nextpath/id/chapter-3-builder.md
        - Level 3 — The Shifter: nextpath/id/chapter-4-shifter.md
        - Level 4 — The Multiplier: nextpath/id/chapter-5-multiplier.md
        - The Universal Loop: nextpath/id/chapter-6-loop.md
        - The Playbook: nextpath/id/the-playbook.md
      - "English Version":
        - "Introduction": nextpath/en/chapter-1-introduction.md
        - Level 1 — The Explorer: nextpath/en/chapter-2-explorer.md
        - Level 2 — The Builder: nextpath/en/chapter-3-builder.md
        - Level 3 — The Shifter: nextpath/en/chapter-4-shifter.md
        - Level 4 — The Multiplier: nextpath/en/chapter-5-multiplier.md
        - The Universal Loop: nextpath/en/chapter-6-loop.md
        - The Playbook: nextpath/en/the-playbook.md

markdown_extensions:
  - meta
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/jankrix
